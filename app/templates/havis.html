<!DOCTYPE html>
<html lang="fi">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <title>Havistin - Havis</title>
        <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
        <link rel="stylesheet" href="{{ url_for('static', filename='style-v2.css') }}">
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
            integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
        <link rel="stylesheet" href="{{ url_for('static', filename='app/havis.css') }}">
    </head>
    <body>
        <header class="top_navi">
            <a href="/" aria-label="Takaisin etusivulle">&laquo;</a>
            <p class="title">Havis (demoversio)</p>
        </header>

        <div class="page_wrapper">
            <main class="havis_main">
                <section id="status-lines" class="status-lines">
                    <p id="gps_status" class="status-line">Show only GPS-related status messages here</p>
                    <p id="session_status" class="status-line hidden" aria-live="polite"></p>
                    <p id="ui_status" class="status-line">Show UI/process-related status here</p>
                </section>

                <section class="controls">
                    <button id="start-btn" class="primary-btn" type="button">Aloita</button>
                    <div id="session-active" class="session-active hidden">
                        <button id="record-btn" class="secondary-btn" type="button">Lisää havainto</button>
                        <button id="end-session-btn" class="secondary-btn" type="button">Lopeta havaintoerä</button>
                    </div>
                    <div id="recording-actions" class="recording-actions hidden">
                        <button id="submit-btn" class="primary-btn" type="button">Valmis</button>
                        <button id="cancel-btn" class="secondary-btn" type="button">Peruuta</button>
                    </div>
                </section>

                <section class="observations">
                    <h2>Havainnot</h2>
                    <div id="observations-list" class="observations-list"></div>
                </section>
            </main>
        </div>

        <div id="detail-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <div class="modal-content">
                <button id="modal-close" class="close-btn" type="button" aria-label="Sulje">&times;</button>
                <h3 id="modal-title">Havainto</h3>
                <div id="modal-body" class="modal-body"></div>
                <div id="modal-map" class="modal-map"></div>
            </div>
        </div>

        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
        <script>
            window.HAVIS_USER_ID = {{ havis_user_id|tojson }};
        </script>
        <script src="{{ url_for('static', filename='app/havis.js') }}"></script>
    </body>
</html>
