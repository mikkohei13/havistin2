<!DOCTYPE html>
<html lang="fi">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <title>Havistin</title>
        <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
        <link rel="stylesheet" href="{{ url_for('static', filename='style-v2.css') }}">
        <style>
            body {
                background: #fff;
                margin: 0;
                padding: 0;
            }

            .top_navi {
                display: flex;
                align-items: center;
                gap: 0.8rem;
                padding: 0.9rem 1rem;
                border-bottom: 1px solid #d9e4e8;
            }

            .top_navi a {
                color: #00657e;
                text-decoration: none;
                font-size: 1.2rem;
                line-height: 1;
            }

            .top_navi .title {
                font-size: 1.1rem;
                font-weight: 700;
                margin: 0;
            }

            main {
                padding: 1rem;
            }

            main h1 {
                margin-top: 0;
            }

            .page_wrapper {
                min-height: calc(100vh - 56px);
                background: transparent url("/static/web_bottom.jpg") bottom left no-repeat;
            }
        </style>
    </head>
    <body>
        <header class="top_navi">
            <a href="/" aria-label="Takaisin etusivulle">&laquo;</a>
            <p class="title">Havistin</p>
        </header>

        <div class="page_wrapper">
            <main>
                <h1>Hello world</h1>
            </main>
        </div>
    </body>
</html>
